# ── ServiceAccount ────────────────────────────────────────────────────────
# A dedicated identity for the dashboard pod — never use the default SA
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-dashboard
  namespace: k8s-dashboard

---
# ── ClusterRole ───────────────────────────────────────────────────────────
# Grants READ-ONLY access to the resources the collector needs.
# We do NOT grant write permissions — this dashboard only reads.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-dashboard-reader
rules:
  # List and watch all namespaces so we can discover products dynamically
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]

  # Read deployments and statefulsets to check replica health
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch"]

  # Read pods to detect CrashLoopBackOff and OOMKilled at pod level
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

---
# ── ClusterRoleBinding ────────────────────────────────────────────────────
# Binds the ClusterRole to our ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-dashboard-reader
subjects:
  - kind: ServiceAccount
    name: k8s-dashboard
    namespace: k8s-dashboard
roleRef:
  kind: ClusterRole
  name: k8s-dashboard-reader
  apiGroup: rbac.authorization.k8s.io
