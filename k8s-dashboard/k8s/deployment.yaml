# ── Namespace ─────────────────────────────────────────────────────────────
# The dashboard lives in its own namespace so it's easy to manage/delete
apiVersion: v1
kind: Namespace
metadata:
  name: k8s-dashboard

---
# ── ConfigMap ─────────────────────────────────────────────────────────────
# Mounts config.yaml into the pod. Edit this instead of the Docker image
# when you want to change thresholds or SMTP settings without rebuilding.
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-config
  namespace: k8s-dashboard
data:
  config.yaml: |
    server:
      port: 8080
      poll_interval: 30s

    excluded_namespaces:
      - kube-system
      - kube-public
      - kube-node-lease
      - k8s-dashboard

    thresholds:
      healthy: 100
      degraded: 70

    notifications:
      email:
        enabled: true
        smtp_host: "smtp.gmail.com"
        smtp_port: 587
        smtp_username: "you@gmail.com"
        smtp_password: "your-app-password"
        from: "k8s-dashboard@yourorg.com"
        to:
          - "team@yourorg.com"
        on_state_change_only: true

---
# ── Deployment ────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-dashboard
  namespace: k8s-dashboard
  labels:
    app: k8s-dashboard
spec:
  replicas: 1   # only one replica needed — it's a read-only dashboard
  selector:
    matchLabels:
      app: k8s-dashboard
  template:
    metadata:
      labels:
        app: k8s-dashboard
    spec:
      serviceAccountName: k8s-dashboard  # use the SA with read-only RBAC

      containers:
        - name: dashboard
          image: yourregistry/k8s-dashboard:latest  # replace with your image
          ports:
            - containerPort: 8080
          args:
            - "-config=/etc/dashboard/config.yaml"  # point to mounted config

          # Mount the ConfigMap as a file at /etc/dashboard/config.yaml
          volumeMounts:
            - name: config
              mountPath: /etc/dashboard
              readOnly: true

          # Resource limits — this app is very lightweight
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

          # Health check — k8s will restart the pod if /api/summary stops responding
          livenessProbe:
            httpGet:
              path: /api/summary
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30

      volumes:
        - name: config
          configMap:
            name: dashboard-config

---
# ── Service ───────────────────────────────────────────────────────────────
# Exposes the dashboard inside the cluster. Add an Ingress below to make
# it reachable from outside.
apiVersion: v1
kind: Service
metadata:
  name: k8s-dashboard
  namespace: k8s-dashboard
spec:
  selector:
    app: k8s-dashboard
  ports:
    - port: 80
      targetPort: 8080

---
