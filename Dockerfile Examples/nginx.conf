# =============================================================================
# nginx.conf — for nginxinc/nginx-unprivileged (non-root)
#
# CRITICAL RULES for non-root nginx:
#   1. NO 'user nginx;' directive — already running as nginx, adding it causes error
#   2. Listen on 8080 NOT 80 — non-root cannot bind to ports below 1024
#   3. All temp/cache paths must be writable by nginx user — use /tmp paths
#   4. pid file must be in a writable location
#
# nginx-unprivileged sets these defaults in the main nginx.conf already:
#   client_body_temp_path /tmp/nginx/client_body
#   proxy_temp_path       /tmp/nginx/proxy
#   fastcgi_temp_path     /tmp/nginx/fastcgi
#   uwsgi_temp_path       /tmp/nginx/uwsgi
#   scgi_temp_path        /tmp/nginx/scgi
# So you only need to configure this server block file.
# =============================================================================

server {
    # ── PORT ──────────────────────────────────────────────────────────────────
    # Must be 8080 — non-root processes cannot bind to ports below 1024
    # Your Kubernetes Service/Ingress should target port 8080
    listen 8080;
    server_name _;

    # ── DOCUMENT ROOT ─────────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # ── SPA ROUTING ───────────────────────────────────────────────────────────
    # All routes fall back to index.html so React Router / Next.js handles routing
    # Without this, refreshing on /dashboard returns 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── HEALTH CHECK ENDPOINT ─────────────────────────────────────────────────
    # Used by Dockerfile HEALTHCHECK and Kubernetes liveness/readiness probes
    # Returns 200 OK without hitting the React app
    location /healthz {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── STATIC ASSET CACHING ──────────────────────────────────────────────────
    # Vite/CRA generate hashed filenames (main.abc123.js) — safe to cache forever
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SECURITY HEADERS ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── GZIP COMPRESSION ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ── HIDE NGINX VERSION ────────────────────────────────────────────────────
    # Prevents version disclosure in response headers
    server_tokens off;

    # ── DISABLE DIRECTORY LISTING ─────────────────────────────────────────────
    autoindex off;

    # ── ERROR PAGES ───────────────────────────────────────────────────────────
    # For SPAs, all errors should return index.html so the app handles them
    error_page 404 /index.html;
}